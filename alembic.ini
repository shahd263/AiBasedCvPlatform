# Alembic config — `sqlalchemy.url` is overridden in alembic/env.py from DATABASE_URL.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Placeholder only; env.py sets the real URL from Core.config.settings.
sqlalchemy.url = postgresql://localhost/placeholder

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
